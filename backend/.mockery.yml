all: true
dir: '{{.InterfaceDir}}'
filename: mocks_test.go
force-file-write: true
formatter: goimports
generate: true
include-auto-generated: false
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}_test'
recursive: true
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
template-data:
  unroll-variadic: true
packages:
  github.com/willie68/MCSPhotoIndex:
    config:
      all: true
  github.com/willie68/MCSPhotoIndex/internal/services/videocache:
    config:
      pkgname: videocache
  github.com/willie68/MCSPhotoIndex/internal/services/video:
    config:
      pkgname: video
  github.com/willie68/MCSPhotoIndex/internal/services/checkup:
    config:
      pkgname: checkup
  github.com/willie68/MCSPhotoIndex/internal/services/imagelist:
    config:
      pkgname: imagelist
  github.com/willie68/MCSPhotoIndex/internal/services/reconcile:
    config:
      pkgname: reconcile
  github.com/willie68/MCSPhotoIndex/internal/services/tagimport:
    config:
      pkgname: tagimport
